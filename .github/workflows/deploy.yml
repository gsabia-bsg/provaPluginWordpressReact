name: Deploy to WordPress

# Si attiva su:
# - push su main (workflow normale, codice già nel repo)
# - repository_dispatch (triggerato da WordPress quando il team carica uno zip)
# - manuale dalla UI di GitHub
on:
  push:
    branches:
      - main

  repository_dispatch:
    types: [wpal_deploy]

  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # CASO 1: push o workflow_dispatch (codice nel repo)
      - name: Checkout repo
        if: github.event_name != 'repository_dispatch'
        uses: actions/checkout@v4

      # CASO 2: repository_dispatch da WordPress (codice nello zip su Release)
      - name: Checkout (per gh CLI)
        if: github.event_name == 'repository_dispatch'
        uses: actions/checkout@v4

      - name: Scarica zip sorgente dalla Release
        if: github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.client_payload.release_tag }}
        run: |
          echo "Deploy triggerato da WordPress, release: $RELEASE_TAG"
          gh release download "$RELEASE_TAG" --pattern 'source.zip' --repo "${{ github.repository }}"

          # Estrai sovrascrivendo il repo checkato (in una sandbox)
          mkdir -p _wp_source
          unzip -q source.zip -d _wp_source
          rm source.zip

          # Se lo zip ha una singola cartella radice, entra dentro
          INSIDE_COUNT=$(ls _wp_source | wc -l)
          if [ "$INSIDE_COUNT" = "1" ] && [ -d "_wp_source/$(ls _wp_source)" ]; then
            INSIDE=$(ls _wp_source)
            mv _wp_source/$INSIDE/* . 2>/dev/null || true
            mv _wp_source/$INSIDE/.[!.]* . 2>/dev/null || true
            rm -rf _wp_source
          else
            cp -r _wp_source/* . 2>/dev/null || true
            cp -r _wp_source/.[!.]* . 2>/dev/null || true
            rm -rf _wp_source
          fi

          # Cleanup di eventuali file inutili
          rm -rf node_modules .git
          echo "Contenuto root:"
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run build

      - name: Create zip
        run: |
          cd dist
          zip -r ../app-deploy.zip .
          cd ..
          echo "Zip creato: $(du -sh app-deploy.zip | cut -f1)"

      - name: Deploy to WordPress
        run: |
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.WP_URL }}/wp-json/wpal/v1/deploy" \
            -H "X-WPAL-Deploy-Key: ${{ secrets.WP_DEPLOY_KEY }}" \
            -F "app_name=${{ secrets.WP_APP_NAME }}" \
            -F "zip_file=@app-deploy.zip")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $(cat response.json)"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Deploy fallito con status $HTTP_STATUS"
            exit 1
          fi

          SUCCESS=$(cat response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success', False))")
          if [ "$SUCCESS" != "True" ]; then
            echo "Deploy fallito: $(cat response.json)"
            exit 1
          fi

          APP_URL=$(cat response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url', ''))")
          echo "Deploy completato! App disponibile su: $APP_URL"